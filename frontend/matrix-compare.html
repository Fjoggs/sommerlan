<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Matrix comparison</title>
    <link href="css/style.css" rel="stylesheet" />
    <link href="css/rsvp.css" rel="stylesheet" />
    <script defer type="module" src="dist/ts/matrix-compare.js"></script>
    <style>
      body { padding: 2rem 1rem; box-sizing: border-box; }

      .mc-section { margin-bottom: 3rem; }
      .mc-section h2 { font-size: 1rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin: 0 0 1rem; }

      /* Card view */
      .mc-card-list { display: flex; flex-direction: column; gap: 0.75rem; }

      .mc-card {
        background: var(--bg);
        border-radius: var(--border-radius);
        padding: 0.75rem 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }

      .mc-card-name {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-weight: 600;
        color: var(--text);
        font-size: 0.95rem;
      }

      .mc-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .mc-days {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .mc-block {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }

      .mc-block-label {
        font-size: 0.6rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        opacity: 0.6;
        padding: 0 0.1rem;
      }

      .mc-block-days {
        display: flex;
        gap: 0.25rem;
        flex-wrap: wrap;
      }

      .mc-day {
        display: flex;
        flex-direction: column;
        align-items: center;
        border-radius: 6px;
        border: 1px solid transparent;
        padding: 0.25rem 0.4rem;
        min-width: 36px;
        text-align: center;
      }

      .mc-day-off {
        border-color: var(--border-muted);
        opacity: 0.3;
      }

      .mc-day-name {
        font-size: 0.65rem;
        text-transform: capitalize;
        color: inherit;
      }

      .mc-day-num {
        font-size: 0.8rem;
        font-weight: 600;
        color: inherit;
      }

      /* Table scroll wrapper */
      #table-view { overflow-x: auto; }
    </style>
  </head>
  <body>
    <div class="mc-section">
      <h2>Table (current)</h2>
      <div id="table-view"></div>
    </div>
    <div class="mc-section">
      <h2>Card view</h2>
      <div id="card-view"></div>
    </div>
  </body>
</html>
