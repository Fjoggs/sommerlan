<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SommerLAN — RSVP</title>
    <link href="css/headings.css" rel="stylesheet" />
    <link href="css/inputs.css" rel="stylesheet" />
    <link href="css/style.css" rel="stylesheet" />
    <link href="css/rsvp.css" rel="stylesheet" />
    <script defer type="module" src="dist/ts/rsvp.js"></script>
  </head>
  <body>


    <main class="rsvp-wrapper">
      <header class="rsvp-header">
        <h1><span class="hash">#</span>SommerLAN 2026</h1>
      </header>

      <!-- Which days? -->
      <section class="rsvp-step" id="step-days">
        <div id="day-picker"></div>
      </section>

      <!-- Submit -->
      <div class="rsvp-footer">
        <p id="rsvp-status" class="rsvp-status" aria-live="polite"></p>
        <button id="rsvp-submit" disabled>Snakkes på LAN</button>
      </div>

      <!-- Confirmation (shown after submit) -->
      <section id="rsvp-confirmation" style="display:none">
        <div id="participant-matrix"></div>
        <button id="rsvp-endre" type="button" class="rsvp-endre-btn desktop-endre">Endre datoer</button>
      </section>
    </main>

    <div id="toast-container"></div>
  </body>
</html>
