<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SommerLAN 2026</title>
    <link href="css/headings.css" rel="stylesheet" />
    <link href="css/style.css" rel="stylesheet" />
    <script defer type="module" src="dist/ts/countdown.js"></script>
    <script defer type="module" src="dist/ts/nav.js"></script>
    <style>
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .countdown-main {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        text-align: center;
        pointer-events: none;
      }

      .countdown-title {
        font-size: clamp(1.5rem, 5vw, 2.5rem);
        font-weight: 700;
        color: var(--text);
        margin: 0;
      }

      .countdown-subtitle {
        color: var(--text-muted);
        margin: 0;
        font-size: 1rem;
      }

      .countdown-units {
        display: flex;
        align-items: flex-start;
        gap: clamp(0.4rem, 2.5vw, 3rem);
        margin-top: 1rem;
      }

      .countdown-unit {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
      }

      .countdown-number {
        font-size: clamp(1.8rem, 11vw, 7rem);
        font-weight: 700;
        color: var(--primary);
        line-height: 1;
        font-variant-numeric: tabular-nums;
        min-width: 2ch;
      }

      .countdown-label {
        font-size: clamp(0.7rem, 2vw, 0.9rem);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-muted);
      }

      .countdown-sep {
        font-size: clamp(1.8rem, 11vw, 7rem);
        font-weight: 300;
        color: var(--border);
        line-height: 1;
        padding-top: 0;
        align-self: flex-start;
      }

      .countdown-started {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.4em;
        margin: 0;
        font-size: clamp(1.5rem, 6vw, 3rem);
        font-weight: 700;
        color: var(--primary);
      }

      .countdown-word {
        opacity: 0;
        transform: translateY(0.3em);
        display: inline-block;
      }

      @keyframes fade-out {
        to { opacity: 0; }
      }

      .fading-out {
        animation: fade-out 0.8s ease forwards;
      }

      @keyframes word-appear {
        to { opacity: 1; transform: translateY(0); }
      }

      .countdown-started.active .countdown-word:nth-child(1) {
        animation: word-appear 0.6s ease forwards 1.0s;
      }
      .countdown-started.active .countdown-word:nth-child(2) {
        animation: word-appear 0.6s ease forwards 2.0s;
      }
      .countdown-started.active .countdown-word:nth-child(3) {
        animation: word-appear 0.6s ease forwards 3.0s;
      }

      .countdown-timer-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        width: 100%;
      }

      .countdown-rsvp {
        pointer-events: auto;
      }

      .countdown-rsvp button {
        font-size: clamp(0.75rem, 2.5vw, 1rem);
        padding: clamp(0.35rem, 1.5vw, 0.6rem) clamp(0.75rem, 3vw, 1.5rem);
      }
    </style>
  </head>
  <body>
    <main class="countdown-main">
      <div class="countdown-timer-group">
        <div id="countdown-units" class="countdown-units">
          <div class="countdown-unit">
            <span id="cd-days" class="countdown-number">--</span>
            <span class="countdown-label">dager</span>
          </div>
          <span class="countdown-sep">:</span>
          <div class="countdown-unit">
            <span id="cd-hours" class="countdown-number">--</span>
            <span class="countdown-label">timer</span>
          </div>
          <span class="countdown-sep">:</span>
          <div class="countdown-unit">
            <span id="cd-minutes" class="countdown-number">--</span>
            <span class="countdown-label">min</span>
          </div>
          <span class="countdown-sep">:</span>
          <div class="countdown-unit">
            <span id="cd-seconds" class="countdown-number">--</span>
            <span class="countdown-label">sek</span>
          </div>
        </div>
        <a href="rsvp" class="nav-pre-lan countdown-rsvp">
          <button type="button">SLEPP MEG INN</button>
        </a>
      </div>

      <p id="countdown-started" class="countdown-started" hidden>
        <span class="countdown-word">Snakkes.</span>
        <span class="countdown-word">på.</span>
        <span class="countdown-word">LAN</span>
      </p>
    </main>
  </body>
</html>
