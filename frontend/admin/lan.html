<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SommerLAN</title>
    <link href="../css/headings.css" rel="stylesheet" />
    <link href="../css/inputs.css" rel="stylesheet" />
    <link href="../css/style.css" rel="stylesheet" />
    <link href="../css/table.css" rel="stylesheet" />
    <script type="module" src="../dist/ts/lan.js"></script>
  </head>
  <body>
    <header>
      <nav class="menu">
        <a class="menu-item" href="/">Home</a>
        <a class="menu-item active" href="/admin">Admin</a>
      </nav>
    </header>
    <main class="content-container">
      <nav class="admin-nav">
        <a href="/admin/game.html" class="link">Spill</a>
        <a href="/admin/lan.html" class="link active">Lan</a>
        <a href="/admin/user.html" class="link">Deltaker</a>
      </nav>
      <section>
        <form id="lanForm">
          <label>
            Startdato
            <input type="date" name="startDate" required />
          </label>
          <label>
            Sluttdato
            <input type="date" name="endDate" required />
          </label>
          <label>
            Beskrivelse
            <textarea
              rows="10"
              cols="40"
              name="description"
              required
            ></textarea>
          </label>
          <label>Kategori</label>
          <div class="radio-group">
            <label>
              <input type="radio" name="type" value="pre" />
              Pre 2014
            </label>
            <label>
              <input type="radio" name="type" value="main" />
              SommerLAN
            </label>
            <label>
              <input type="radio" name="type" value="side" />
              Off Season
            </label>
          </div>
          <label>Deltakere</label>
          <div id="user-list"></div>
          <label>Spill</label>
          <div id="game-list"></div>
          <button type="submit">Submit</button>
        </form>
      </section>
      <table>
        <thead>
          <tr>
            <th></th>
            <th>Startdato</th>
            <th>Sluttdato</th>
            <th>Beskrivelse</th>
            <th>Era</th>
            <th>Deltakere</th>
            <th>Spill</th>
          </tr>
        </thead>
        <tbody id="lanTable"></tbody>
      </table>
    </main>
  </body>
</html>
