<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SommerLAN</title>
    <link href="../style.css" rel="stylesheet" />
    <script type="module" src="../dist/ts/lan.js"></script>
  </head>
  <body>
    <header>
      <nav class="menu">
        <a class="menu-item" href="/">Home</a>
        <a class="menu-item active" href="/admin">Admin</a>
      </nav>
    </header>
    <main class="content-container">
      <nav class="admin-nav">
        <ul class="admin-nav-list">
          <li class="admin-nav-item">
            <a href="/admin/game.html" class="admin-nav-link">Spill</a>
          </li>
          <li class="admin-nav-item">
            <a href="/admin/lan.html" class="admin-nav-link active">Lan</a>
          </li>
          <li class="admin-nav-item">
            <a href="/admin/user.html" class="admin-nav-link">Deltaker</a>
          </li>
        </ul>
      </nav>
      <section>
        <h2>Lan</h2>
        <form id="lanForm">
          <label>
            Startdato
            <input type="date" name="startDate" required />
          </label>
          <label>
            Sluttdato
            <input type="date" name="endDate" required />
          </label>
          <label>
            Beskrivelse
            <textarea
              rows="10"
              cols="40"
              name="description"
              required
            ></textarea>
          </label>
            <label> Kategori </label>
          <div class="radio-group">
            <label>
              <input type="radio" name="type" value="pre" />
              Pre 2014
            </label>
            <label>
              <input type="radio" name="type" value="main" />
              SommerLAN
            </label>
            <label>
              <input type="radio" name="type" value="side" />
              Off Season
            </label>
          </div>
          <label>
            Deltakere
            <div>
              <div id="removeUserButtons"></div>
              <input type="hidden" id="userListInput" disabled />
              <div id="addUserButtons"></div>
            </div>
          </label>
          <button type="submit">Submit</button>
        </form>
      </section>
      <table>
        <thead>
          <tr>
            <th>Startdato</th>
            <th>Sluttdato</th>
            <th>Beskrivelse</th>
            <th>Era</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="lanTable"></tbody>
      </table>
    </main>
  </body>
</html>
